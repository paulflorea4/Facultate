<!DOCTYPE html>
<html lang="ro" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Dashboard admin</title>
    <style>
        body { font-family: Arial, sans-serif; background: #f4f7f6; margin: 0; padding: 40px; }
        .container { max-width: 1200px; margin: auto; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; }
        .card { background: white; padding: 24px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.08); margin-bottom: 22px; }
        .actions { display: flex; gap: 10px; flex-wrap: wrap; margin: 18px 0; }
        .btn { text-decoration: none; border: none; padding: 10px 14px; border-radius: 6px; font-weight: bold; cursor: pointer; display: inline-block; }
        .btn-primary { background: #3498db; color: white; }
        .btn-success { background: #27ae60; color: white; }
        .btn-danger { background: #e74c3c; color: white; }
        .btn-secondary { background: #2c3e50; color: white; }
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 12px; border-bottom: 1px solid #ecf0f1; text-align: left; }
        th { background: #f8f9fa; }
        .status { font-weight: bold; }
        .status.available { color: #27ae60; }
        .status.service { color: #e67e22; }
        .status.deleted { color: #c0392b; }
        .alert { background: #d4edda; color: #155724; border: 1px solid #c3e6cb; padding: 12px 16px; border-radius: 8px; margin-bottom: 18px; }
        .error { background: #f8d7da; color: #721c24; border-color: #f5c6cb; }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <h1>Dashboard admin</h1>
        <div style="display:flex; gap:10px; align-items:center;">
            <a th:href="@{/cars}" class="btn btn-secondary">Vezi lista publică</a>
            <form th:action="@{/logout}" method="post" style="margin: 0;" onsubmit="return confirm('Ești sigur că vrei să te deloghezi?');">
                <button type="submit" class="btn btn-danger">Ieșire</button>
            </form>
        </div>
    </div>

    <div th:if="${successMessage}" class="alert" th:text="${successMessage}"></div>
    <div th:if="${errorMessage}" class="alert error" th:text="${errorMessage}"></div>

    <div class="card">
        <div class="actions">
            <a th:href="@{/admin/cars/new}" class="btn btn-primary">Adaugă mașină</a>
            <a th:href="@{/admin/features/new}" class="btn btn-success">Adaugă dotare</a>
        </div>

        <h2>Mașini</h2>
        <table>
            <thead>
            <tr>
                <th>Marcă</th>
                <th>Model</th>
                <th>Stare</th>
                <th>Acțiuni</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="car : ${cars}">
                <td th:text="${car.brand}">Brand</td>
                <td th:text="${car.model}">Model</td>
                <td>
                    <span class="status" th:classappend="${car.status.name() == 'AVAILABLE' ? ' available' : (car.status.name() == 'SERVICE' ? ' service' : ' deleted')}" th:text="${car.status}">AVAILABLE</span>
                </td>
                <td>
                    <a th:href="@{/admin/cars/{id}/edit(id=${car.id})}" class="btn btn-primary">Editează</a>
                    <form th:action="@{/admin/cars/{id}/delete(id=${car.id})}" method="post" style="display:inline;" onsubmit="return confirm('Ești sigur că vrei să ștergi această mașină?');">
                        <button type="submit" class="btn btn-danger">Șterge</button>
                    </form>
                </td>
            </tr>
            </tbody>
        </table>
    </div>

    <div class="card">
        <h2>Dotări</h2>
        <table>
            <thead>
            <tr>
                <th>Nume</th>
                <th>Acțiuni</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="feature : ${features}">
                <td th:text="${feature.name}">Feature</td>
                <td>
                    <a th:href="@{/admin/features/{id}/edit(id=${feature.id})}" class="btn btn-primary">Editează</a>
                    <form th:action="@{/admin/features/{id}/delete(id=${feature.id})}" method="post" style="display:inline;" onsubmit="return confirm('Ești sigur că vrei să ștergi această dotare?');">
                        <button type="submit" class="btn btn-danger">Șterge</button>
                    </form>
                </td>
            </tr>
            </tbody>
        </table>
    </div>
</div>
</body>
</html>
