spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/SGBD
    username: postgres
    password: flo
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

  liquibase:
    change-log: db.changelog-master.xml
    enabled: true

logging:
  level:
    liquibase: INFO
    org.hibernate.SQL: DEBUG
    com.lab5: DEBUG
