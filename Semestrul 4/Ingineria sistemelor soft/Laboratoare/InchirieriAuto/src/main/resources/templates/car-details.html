<!DOCTYPE html>
<html lang="ro" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <title>Detalii Mașină</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f4f7f6; padding: 40px; }
        .container { max-width: 900px; margin: auto; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        .back-link { text-decoration: none; color: #007bff; font-weight: bold; }
        .car-header { border-bottom: 2px solid #eee; padding-bottom: 20px; margin-bottom: 20px; }
        .specs { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; align-items: start; }
        .price { font-size: 24px; color: #28a745; font-weight: bold; }
        .features-list { margin-top: 20px; }
        .features-list h3 { margin-bottom: 12px; }
        .features-wrap { display: flex; gap: 10px; flex-wrap: wrap; align-items: center; }
        .badge { background: #f1f3f5; padding: 6px 12px; border-radius: 16px; margin: 0; font-size: 13px; display: inline-flex; align-items: center; box-shadow: 0 1px 0 rgba(0,0,0,0.03); }
        .btn-reserve { display: block; width: 220px; margin: 30px auto 0 auto; text-align: center; background: #ff9800; color: white;
            padding: 15px; text-decoration: none; border-radius: 8px; font-weight: bold; }
        .btn-reserve:hover { background: #e68a00; }
        .alert { background: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; padding: 12px 16px; border-radius: 8px; margin-bottom: 20px; }
    </style>
</head>
<body>

<div class="container">
    <div th:if="${reservedSuccess}" style="background:#d4edda;color:#155724;border:1px solid #c3e6cb;padding:12px 16px;border-radius:8px;margin-bottom:20px;">
        Rezervarea a fost trimisă cu succes.
    </div>
    <div th:if="${errorMessage}" class="alert" th:text="${errorMessage}"></div>

    <div th:if="${car != null}">
    <a th:href="@{/cars}" class="back-link">&larr; Înapoi la listă</a>

    <div class="car-header">
        <h1 th:text="${car.brand} + ' ' + ${car.model}">Marca Model</h1>
        <p>An fabricație: <span th:text="${car.year}">2022</span> | Status: <strong th:text="${car.status}">AVAILABLE</strong></p>
    </div>

    <div class="specs">
        <div>
            <h3>Detalii Preț</h3>
            <p class="price" th:text="${car.pricePerDay} + ' EUR / zi'"></p>
            <p>Se aplică taxe de asigurare standard la finalizarea rezervării.</p>
        </div>

        <div class="features-list">
            <h3>Dotări Disponibile</h3>
            <div th:if="${car.features != null and !#lists.isEmpty(car.features)}">
                <div class="features-wrap">
                    <span th:each="feature : ${car.features}" class="badge" th:text="${feature.name}">Feature</span>
                </div>
            </div>
            <p th:if="${car.features == null or #lists.isEmpty(car.features)}">Nu sunt dotări speciale specificate.</p>
        </div>
    </div>

    <a sec:authorize="hasRole('CLIENT')" th:href="@{/rents/new(carId=${car.id})}" class="btn-reserve">REZERVĂ ACEASTĂ MAȘINĂ</a>
    </div>
</div>

</body>
</html>
