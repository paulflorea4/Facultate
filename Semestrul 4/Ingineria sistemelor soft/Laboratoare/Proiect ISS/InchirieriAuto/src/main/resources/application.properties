spring.application.name=InchirieriAuto
spring.datasource.url=jdbc:postgresql://localhost:5432/InchirieriAuto
spring.datasource.username=postgres
spring.datasource.password=flo
spring.datasource.hikari.connection-timeout=3000
spring.datasource.hikari.validation-timeout=2000
spring.datasource.hikari.initialization-fail-timeout=1
spring.datasource.hikari.data-source-properties.connectTimeout=3
spring.datasource.hikari.data-source-properties.socketTimeout=5
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
logging.level.org.hibernate.orm.results=DEBUG