name: 🏗️ Diagram Auto-Update

on:
  pull_request:
    types: [opened, synchronize]
    paths:
      - "**/*.py"
      - "!tests/**"
      - "!eval/**"

  push:
    branches: [main]
    paths:
      - "**/*.py"

permissions:
  contents: read
  pull-requests: write

jobs:
  generate-diagrams:
    name: Generate Architecture Diagrams
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 2  # pentru a detecta fișierele modificate

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Detect changed Python files
        id: changed_files
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            BASE="${{ github.event.pull_request.base.sha }}"
            HEAD="${{ github.event.pull_request.head.sha }}"
          else
            BASE="${{ github.event.before }}"
            HEAD="${{ github.event.after }}"
          fi

          CHANGED=$(git diff --name-only "$BASE" "$HEAD" -- "*.py" | grep -v "test_\|_test\.py\|eval/" | head -20)
          echo "files=$CHANGED" >> $GITHUB_OUTPUT
          echo "Changed Python files: $CHANGED"

      - name: Generate diagrams for changed files
        if: steps.changed_files.outputs.files != ''
        env:
          AZURE_OPENAI_API_KEY: ${{ secrets.AZURE_OPENAI_API_KEY }}
          AZURE_OPENAI_ENDPOINT: ${{ secrets.AZURE_OPENAI_ENDPOINT }}
          AZURE_OPENAI_DEPLOYMENT: ${{ secrets.AZURE_OPENAI_DEPLOYMENT }}
          CHROMA_DB_PATH: ./data/chromadb
        run: |
          mkdir -p /tmp/diagrams

          for FILE in ${{ steps.changed_files.outputs.files }}; do
            if [ -f "$FILE" ]; then
              echo "📊 Generating diagram for: $FILE"
              BASENAME=$(basename "$FILE" .py)

              python -m src.agent.cli generate \
                --file "$FILE" \
                --type classDiagram \
                --output "/tmp/diagrams/${BASENAME}_class.mmd" \
                --no-rag || echo "⚠️ Failed for $FILE (classDiagram)"

              python -m src.agent.cli generate \
                --file "$FILE" \
                --type flowchart \
                --output "/tmp/diagrams/${BASENAME}_flow.mmd" \
                --no-rag || echo "⚠️ Failed for $FILE (flowchart)"
            fi
          done

      - name: Build PR comment
        if: github.event_name == 'pull_request' && steps.changed_files.outputs.files != ''
        id: build_comment
        run: |
          python << 'EOF'
          import os
          import glob

          diagrams_dir = "/tmp/diagrams"
          files = glob.glob(f"{diagrams_dir}/*.mmd")

          if not files:
              print("No diagrams generated")
              exit(0)

          comment = "## 🏗️ Architecture Diagrams — Auto-generated\n\n"
          comment += "> Diagrams automatically generated by [Diagram-as-Code AI Assistant]\n\n"

          for fpath in sorted(files):
              fname = os.path.basename(fpath)
              module_name = fname.replace("_class.mmd", "").replace("_flow.mmd", "")
              diagram_type = "Class Diagram" if "_class" in fname else "Flowchart"

              with open(fpath, "r") as f:
                  content = f.read().strip()

              if content:
                  comment += f"### `{module_name}` — {diagram_type}\n\n"
                  comment += f"```mermaid\n{content}\n```\n\n"

          comment += "---\n*Generated with Azure OpenAI (GPT-4o) + AST analysis*"

          with open("/tmp/pr_comment.md", "w") as f:
              f.write(comment)

          print("Comment built successfully")
          EOF

      - name: Post PR comment
        if: github.event_name == 'pull_request' && steps.changed_files.outputs.files != ''
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const commentPath = '/tmp/pr_comment.md';

            if (!fs.existsSync(commentPath)) {
              console.log('No comment file found, skipping');
              return;
            }

            const body = fs.readFileSync(commentPath, 'utf8');
            if (!body.trim()) {
              console.log('Empty comment, skipping');
              return;
            }

            // Caută comentariu existent și actualizează-l
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const botComment = comments.find(c =>
              c.user.type === 'Bot' &&
              c.body.includes('Architecture Diagrams — Auto-generated')
            );

            if (botComment) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: botComment.id,
                body: body,
              });
              console.log('Updated existing comment');
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: body,
              });
              console.log('Created new comment');
            }

  validate-consistency:
    name: Validate Architectural Consistency
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run consistency checks
        run: |
          python -c "
          from src.utils.validator import MermaidValidator
          import glob, sys

          validator = MermaidValidator()
          errors_found = []

          for fpath in glob.glob('**/*.mmd', recursive=True) + glob.glob('**/*.md', recursive=True):
              try:
                  with open(fpath) as f:
                      content = f.read()

                  import re
                  mermaid_blocks = re.findall(r'\`\`\`mermaid\s*(.*?)\s*\`\`\`', content, re.DOTALL)
                  for block in mermaid_blocks:
                      is_valid, errs = validator.validate(block)
                      if not is_valid:
                          errors_found.append(f'{fpath}: {errs}')
              except Exception:
                  pass

          if errors_found:
              print('❌ Diagrame invalide găsite:')
              for e in errors_found:
                  print(f'  {e}')
              sys.exit(1)
          else:
              print('✅ Toate diagramele Mermaid sunt valide sintactic')
          "
