<!DOCTYPE html>
<html lang="ro" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Formular dotare</title>
    <style>
        body { font-family: Arial, sans-serif; background: #f4f7f6; margin: 0; padding: 40px; }
        .container { max-width: 600px; margin: auto; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .alert { background: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; padding: 12px 16px; border-radius: 8px; margin-bottom: 20px; }
        .form-group { margin-bottom: 15px; display: flex; flex-direction: column; }
        label { font-weight: bold; margin-bottom: 6px; }
        input { padding: 10px; border: 1px solid #ddd; border-radius: 6px; }
        .input-invalid { border-color: #c0392b; background: #fff5f5; }
        .field-error { color: #c0392b; font-size: 0.85rem; margin-top: 4px; }
        .actions { display: flex; gap: 10px; margin-top: 20px; }
        .btn { border: none; padding: 12px 18px; border-radius: 6px; font-weight: bold; cursor: pointer; text-decoration: none; display: inline-block; }
        .btn-primary { background: #27ae60; color: white; }
        .btn-secondary { background: #2c3e50; color: white; }
    </style>
</head>
<body>
<div class="container">
    <a th:href="@{/admin}" class="btn btn-secondary">&larr; Înapoi la dashboard</a>
    <h1 th:text="${featureFormDTO.id == null ? 'Adaugă dotare' : 'Editează dotarea'}">Formular dotare</h1>

    <div th:if="${errorMessage}" class="alert" th:text="${errorMessage}"></div>

    <form th:action="@{/admin/features}" th:object="${featureFormDTO}" method="post">
        <input type="hidden" th:field="*{id}">

        <div class="form-group">
            <label for="name">Nume dotare</label>
            <input id="name" type="text" th:field="*{name}" th:classappend="${#fields.hasErrors('name') ? 'input-invalid' : ''}">
            <div class="field-error" th:if="${#fields.hasErrors('name')}" th:errors="*{name}"></div>
        </div>

        <div class="actions">
            <button type="submit" class="btn btn-primary">Salvează</button>
        </div>
    </form>
</div>
</body>
</html>
